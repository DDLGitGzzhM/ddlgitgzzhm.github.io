认知] 裸K 先导基础\"}","{\"date\":\"2025-07-29\",\"permalink\":\"/p/k-price-learning-2/\",\"summary\":\"\",\"title\":\"[交易认知] 裸K 先导基础 2\"}","{\"date\":\"2025-07-28\",\"permalink\":\"/p/future-leaning-2/\",\"summary\":\"\\n\",\"title\":\"[交易认知] MACD 重新认知\"}","{\"date\":\"2025-07-28\",\"permalink\":\"/p/future-learning-1/\",\"summary\":\"前言 很高兴又能继续更新我的博客，上一篇博客停留在了 5月26号，时隔两个月经历了许多事情。现在总算又回归平静，重整旗鼓我们重新出发。\\n仓位管理 \",\"title\":\"[交易认知] 仓位管理和手续费\"}","{\"date\":\"2025-07-28\",\"permalink\":\"/p/future-think-1/\",\"summary\":\" 兴尽悲来,识盈虚之有数\\n-《滕王阁序》\\n假若经历过 亲情、爱情、友情、物质的起落。\\n不会把车子、房子、外貌、金钱、学历、地位等随时变化的东西作为自己的底气。\\n\",\"title\":\"[交易心态] 兴尽悲来,识盈虚之有数\"}","{\"date\":\"2025-05-26\",\"permalink\":\"/p/com-practise-2/\",\"summary\":\"某音短视频 各个视频的平均完播率 题目 :\\nQ : 如何计算两个列的差值\\nA : 使用 TIMESTAMPDIFF(unit, start_time, end_tiem) 或者是 使用 DATEDIFF(end_date, start_time)\\n如果使用 DATEDIFF 返回的是 相差的天数 对于使用 TIMESTAMPDIFF 可以使用下列枚举值 SECOND, MINUTE , HOUR, DAY, WEEK, MONTH, YEAR 思路 :\\n\",\"title\":\"[SQL] 综合练习 2\"}","{\"date\":\"2025-05-25\",\"permalink\":\"/p/hdu-0x01-math-02/\",\"summary\":\"快速幂 求 A^B 的最后三位数表示的整数 输入格式 输入数据包含多个测试实例 每个实例占一行，由两个正整数A和B组成（1 ≤ A,B ≤ 10000） 如果A=0且B=0，则表示输入结束，不做处理 输出格式 对于每个测试实例，输出A^B的最后三位表示的整数 每个输出占一行 输入输出示例 输入样例 输出样例 2 3 8 12 6 984 6789 10000 1 0 0 (无输出) 算法讲解 :\\n\",\"title\":\"[Hdu] 数学基础 day2\"}","{\"date\":\"2025-05-25\",\"permalink\":\"/p/com-practise-1/\",\"summary\":\"练习 统计复旦用户8月练题情况 题目：现在运营想要了解复旦大学的每个用户在8月份练习的总题目数和回答正确的题目数情况，请取出相应明细数据，对于在8月份没有练习过的用户，答题数结果返回0。\\n\",\"title\":\"[SQL] 综合练习 1\"}","{\"date\":\"2025-05-23\",\"permalink\":\"/p/necessary-select-2/\",\"summary\":\"文本函数 统计每种性别的人数 题目：现在运营举办了一场比赛，收到了一些参赛申请，表数据记录形式如下所示，现在运营想要统计每个性别的用户分别有多少参赛者，请取出相应结果\\n\",\"title\":\"[SQL] 必要函数 2\"}","{\"date\":\"2025-05-08\",\"permalink\":\"/p/necessary-select-1/\",\"summary\":\"条件函数 计算25岁以上和以下的用户数量 以下是修复后的Markdown内容，保持引用格式并优化表格展示：\\n题目：现在运营想要将用户划分为25岁以下和25岁及以上两个年龄段，分别查看这两个年龄段用户数量\\n本题注意：age为null 也记为 25岁以下\\n\",\"title\":\"[SQL] 必要函数\"}","{\"date\":\"2025-05-07\",\"permalink\":\"/p/multi-select/\",\"summary\":\"子查询 浙江大学用户题目回答情况 题目：现在运营想要查看所有来自浙江大学的用户题目回答明细情况，请你取出相应数据\\n示例：question_practice_detail\\nid device_id question_id result 1 2138 111 wrong 第一行表示：id为1的用户的常用信息为使用的设备id为2138，在question_id为111的题目上，回答错误\\n\",\"title\":\"[SQL] 多表查询\"}","{\"date\":\"2025-05-06\",\"permalink\":\"/p/binance-staking-activity-2/\",\"summary\":\"新一期的 TGE 目前分数 115 从 4.29 日的 75 分，经过 8 天，就飞升到了 142 分，总共差额 67 ,平均 9.5(除去当天) 简单可以计算出，top 层级的玩家基本上一天会刷个 10 分，资产人均 2分 加上 8分交易量 ，大概是 256u 115 + 11 * x = 142 + 10 * x \",\"title\":\"[Binance] 送钱活动 3\"}","{\"date\":\"2025-05-06\",\"permalink\":\"/p/senior-select-1/\",\"summary\":\"高级操作符练习 1 题目：现在运营想要找到male且GPA在3.5以上(不包括3.5)的用户进行调研，请你取出相关数据。\\n业务场景中, 需要提前加上其他判断 gpa is not null 1 select device_id,gender,age,university,gpa from user_profile where gpa \\u0026gt; 3.5 and gender = \\u0026#39;male\\u0026#39; 牛科练习题目\\n\",\"title\":\"[SQL] 高级操作符\"}","{\"date\":\"2025-05-06\",\"permalink\":\"/p/senior-select-2/\",\"summary\":\"计算函数 查找GPA最高值 题目：运营想要知道复旦大学学生gpa最高值是多少，请你取出相应数据\\n关键点 max 四舍五入函数 round(value, pos) 1 2 3 4 5 6 7 8 select max(gpa) as gpa from user_profile where university = \\u0026#39;复旦大学\\u0026#39; limit 1; select round(max(gpa), 1) from user_profile where university=\\u0026#39;复旦大学\\u0026#39;; SELECT gpa FROM user_profile WHERE university = \\u0026#39;复旦大学\\u0026#39; ORDER BY gpa DESC LIMIT 1 计算男生人数以及平均GPA 题目：现在运营想要看一下男性用户有多少人以及他们的平均gpa是多少，用以辅助设计相关活动，请你取出相应数据。\\n\",\"title\":\"[SQL] 高级查询\"}","{\"date\":\"2025-05-04\",\"permalink\":\"/p/binance-staking-activity-1/\",\"summary\":\"资产策略现状 自从第一篇笔记开始，现在每天都有一个 todo list 需要给 binance 刷一下交易量，有点ptsd了 DATE BUY SELL DIFF 04-29 513 509 4U 04-30 513 509 4U 04-30 513 509 4U 05-01 513 509 4U 05-02 513 509 4U 05-03 513 511 2U 05-04 513 510 3U 目前总共磨损 4 *5 + 5 = 25U , 预计磨损 100U 破防。 按照 4 U 一天计算的话，大概还有25天破防 现在积分 85 , 最近一波在 5月7号，大概还有3天, 预计我还可以刷 22 分 ，也就是 118 . 预计是 140 ，大概是赶不上 \",\"title\":\"[Binance] 送钱活动 2\"}","{\"date\":\"2025-05-04\",\"permalink\":\"/p/hdu-0x01-math/\",\"summary\":\"引导问题 整数求和 1 2 3 4 5 6 7 8 9 Hey, welcome to HDOJ(Hangzhou Dianzi University Online Judge). In this problem, your task is to calculate SUM(n) = 1 + 2 + 3 + ... + n. Input The input will consist of a series of integers n, one integer per line. Output For each case, output SUM(n) in one line, followed by a blank line. You may assume the result will be in the range of 32-bit signed integer. 常规做法是 for-each 后对 sum 进行累加，然后输出 我们可以根据 等差数列高斯公式求得 (a + b) * n / 2 不过这题需要注意的是 4. 我们计算乘法的时候可能暴 int , 因为对于两个 int32 的数相乘必然会爆 int32 所以我们需要开辟成 int64 题目链接如下, 由于不支持 GO 所以不做\\n\",\"title\":\"[Hdu] 数学基础\"}","{\"date\":\"2025-04-29\",\"permalink\":\"/p/binance-staking-activity/\",\"summary\":\" 目前积分是 55 分 没想到短短 4 日，积分要求就从 45 飞到 80 ，整整长了 35 分 目前策略是 2 + 5 = 7 , 4 * 7 = 28 怎么都追不上 预计更换策略 2 + 9 = 11 , 4 * 11 = 44 (diff : 16) , ( diff calc per 16 * 4 = 64 ) 预计更换策略 512 一周，吃不到也没办法了 。\\n\",\"title\":\"[Binance] 送钱活动\"}","{\"date\":\"2025-04-29\",\"permalink\":\"/p/leetcode-560/\",\"summary\":\"题目 给你一个整数数组 nums 和一个整数 k ，请你统计并返回 该数组中和为 k 的子数组的个数 。 子数组是数组中元素的连续非空序列。\\n示例 1：\\n输入：nums = [1,1,1], k = 2\\n\",\"title\":\"[LeetCode][hot100] 560. 和为 K 的子数组\"}","{\"date\":\"2025-04-29\",\"permalink\":\"/p/limit-select/\",\"summary\":\"基础排序 查询后排序 asc 升序 ascending desc 降序 descending 1 select device_id, age from user_profile order by age asc 牛客网题目链接\\n牛客网题目链接 (降序排列)\\n查询后多列排序 多列排序使用, 隔开 不指定排序顺序，默认是 asc 1 2 3 4 5 select device_id,gpa,age from user_profile order by gpa asc, age asc SELECT device_id,gpa,age from user_profile order by gpa,age;默认以升序排列 SELECT device_id,gpa,age from user_profile order by gpa,age asc; SELECT device_id,gpa,age from user_profile order by gpa asc,age asc; 牛客网题目链接\\n\",\"title\":\"[SQL] 条件查询\"}","{\"date\":\"2025-04-24\",\"permalink\":\"/p/primary-select/\",\"summary\":\"查询所有列 两种做法,一种是 *, 另外一种是全量的显示所有的列。 本质上这两个没什么区别\\n从业务角度来看\\n如果当前的 sql 并不打算查新增的列 则可以使用第一种 如果后续有列被删除了, 第二种也需要同步改动(当然生产环境很少有直接删除的) 从索引角度来看\\n\",\"title\":\"[SQL] 基础查询\"}","{\"date\":\"2025-04-24\",\"permalink\":\"/p/srp/\",\"summary\":\"简要 对于一个温度显示系统，
